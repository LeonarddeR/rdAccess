name: build addon

on:
  push:
    tags: ["*"]
    # To build on main/master branch, uncomment the following line:
    branches: [ main , master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

jobs:
  build:
    # Building the add-on template as an add-on does not make sense (and fails).
    # Do not modify this repo name with your own one! (should remain the template)
    if: github.repository != 'nvaccess/addonTemplate'

    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install Gettext via MSYS2
      id: msys2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          gettext
          mingw-w64-ucrt-x86_64-gettext-tools
    - name: Add Gettext to PATH
      run: Add-Content $env:GITHUB_PATH "${{ steps.msys2.outputs.msys2-location }}\ucrt64\bin"
    - name: Checkout NVDA source for ty
      run: git clone --depth 1 --no-recurse-submodules https://github.com/nvaccess/nvda.git ../nvda
    - name: Install dependencies
      run: uv sync

    - name: Code checks
      run: $env:SKIP = "no-commit-to-branch"; uv run prek run --all-files

    - name: building addon
      run: uv run scons && uv run scons pot

    - uses: actions/upload-artifact@v7
      with:
        name: packaged_addon
        path: |
          ./*.nvda-addon
        archive: false

    - uses: actions/upload-artifact@v7
      with:
        name: translation_template
        path: |
          ./*.pot
        archive: false

  upload_release:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: ["build"]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - name: download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: .
        merge-multiple: true
    - name: Display structure of downloaded files
      run: ls -R
    - name: Calculate sha256
      run: |
        echo -e "\nSHA256: " >> changelog.md
        sha256sum *.nvda-addon >> changelog.md

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          *.nvda-addon
          *.pot
        body_path: changelog.md
        fail_on_unmatched_files: true
        prerelease: ${{ contains(github.ref, '-') }}
